name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".vscode/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install
      - run: pnpm run build

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: ./dist/**
          prerelease: true
